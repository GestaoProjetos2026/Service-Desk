name: Deploy do Setor - Gabriele (Squad 4)

on:
  push:
    branches: [ "develop" ]

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Login no Docker Hub usando as SUAS secrets individuais
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_GABRIELE }}
          password: ${{ secrets.DOCKERHUB_TOKEN_GABRIELE }}

      # 3. Build e Envio para o SEU repositório
      - name: Build e Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME_GABRIELE }}/projeto-setor:latest

      # 4. Deploy na VM 
      - name: Deploy na VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Baixa a imagem do seu Docker Hub
            docker pull ${{ secrets.DOCKERHUB_USERNAME_GABRIELE }}/projeto-setor:latest
            
            # Garante que o seu container antigo seja parado antes de subir o novo
            docker stop container-setor-gabriele || true
            docker rm container-setor-gabriele || true
            
            # Sobe o novo container na porta 8084
            docker run -d \
              --name container-setor-gabriele \
              -p 8084:80 \
              ${{ secrets.DOCKERHUB_USERNAME_GABRIELE }}/projeto-setor:latest
